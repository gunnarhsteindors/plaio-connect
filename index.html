<title>PLAIO — connect & capture</title>
<style>
  :root{--o:#F5A623;--amber:#FFBE44;--black:#1E1E1E;--slate:#9A9DB5;--line:#33333a;--field:#262629;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Helvetica Neue","Segoe UI",system-ui,-apple-system,Arial,sans-serif;-webkit-font-smoothing:antialiased;}
  .page{min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:22px 14px 40px;
    background:#141414;background-image:repeating-linear-gradient(135deg,rgba(255,255,255,.022) 0,rgba(255,255,255,.022) 1px,transparent 1px,transparent 22px);}
  .card{width:100%;max-width:420px;background:var(--black);border:1px solid #2c2c2c;border-radius:24px;
    padding:28px 26px 24px;color:#fff;box-shadow:0 24px 60px rgba(0,0,0,.45);
    background-image:repeating-linear-gradient(135deg,rgba(255,255,255,.016) 0,rgba(255,255,255,.016) 1px,transparent 1px,transparent 26px);}
  .logo{display:flex;justify-content:center;margin-bottom:6px}
  .logo img{height:34px;width:auto;display:block}
  .who{text-align:center;color:var(--slate);font-size:12px;margin-bottom:20px}
  .who b{color:#fff;font-weight:600}
  .qr-wrap{display:flex;flex-direction:column;align-items:center;gap:10px;margin-bottom:8px}
  .qr-cap{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--slate);font-weight:600}
  .qr-tile{background:#fff;padding:12px;border-radius:16px;line-height:0;box-shadow:0 6px 22px rgba(0,0,0,.35)}
  .qr-tile img{width:178px;height:178px;display:block}
  .divider{display:flex;align-items:center;gap:12px;color:var(--slate);font-size:11px;letter-spacing:2px;
    text-transform:uppercase;font-weight:600;margin:24px 0 16px}
  .divider::before,.divider::after{content:"";flex:1;height:1px;background:#2c2c2c}
  label{display:block;font-size:11px;letter-spacing:1.4px;text-transform:uppercase;color:var(--slate);font-weight:600;margin-bottom:7px}
  input,textarea{width:100%;background:var(--field);border:1px solid var(--line);border-radius:12px;color:#fff;
    font-size:16px;padding:13px 14px;font-family:inherit;outline:none;transition:border-color .15s}
  input::placeholder,textarea::placeholder{color:#6c6c78}
  input:focus,textarea:focus{border-color:var(--o)}
  textarea{resize:vertical;min-height:74px;line-height:1.5}
  .field{margin-bottom:14px}
  .btns{display:flex;flex-direction:column;gap:10px;margin-top:4px}
  .btn{display:flex;align-items:center;justify-content:center;gap:9px;width:100%;font-weight:700;font-size:15.5px;
    border-radius:12px;padding:14px;cursor:pointer;font-family:inherit;transition:background .15s,border-color .15s}
  .btn svg{width:18px;height:18px}
  .btn-primary{background:var(--o);color:var(--black);border:none}
  .btn-primary:hover{background:var(--amber)}
  .btn-ghost{background:transparent;color:var(--o);border:1px solid var(--o)}
  .btn-ghost:hover{background:rgba(245,166,35,.1)}
  .status{font-size:13px;font-weight:600;text-align:center;margin-top:12px;min-height:18px}
  .status.ok{color:#5fd08a}
  .status.warn{color:var(--amber)}
  .hint{font-size:12px;color:var(--slate);line-height:1.45;text-align:center;margin-top:14px}
  .clear{display:block;margin:10px auto 0;background:none;border:none;color:var(--slate);font-size:13px;
    cursor:pointer;text-decoration:underline;font-family:inherit}
  .clear:hover{color:var(--amber)}
  .footer{text-align:center;font-size:10px;letter-spacing:2.2px;text-transform:uppercase;color:var(--slate);
    font-weight:600;margin-top:20px;padding-top:16px;border-top:1px solid #2c2c2c}
  .footer .dot{color:var(--o);margin:0 5px}
</style>

      </button>
      <button class="btn btn-ghost" id="toMe">

<script>
  (function(){
    var name = document.getElementById("name");
    var email = document.getElementById("email");
    var notes = document.getElementById("notes");
    var status = document.getElementById("status");
    function enc(s){ return encodeURIComponent(s); }
    function show(msg, cls){ status.textContent = msg; status.className = "status " + cls; }

    document.getElementById("toLead").addEventListener("click", function(){
      var n = name.value.trim(), e = email.value.trim();
      if(!e){ show("Add their email first ↑", "warn"); email.focus(); return; }
      var greet = n ? ("Hi " + n + ",") : "Hi there,";
      var subject = "Great to connect — Gunnar at PLAIO";
      var body = greet + "\n\n"
        + "Great to meet you. As promised, here are my details — save them, or just hit reply anytime.\n\n"
        + "Gunnar Steindorsson\n"
        + "Business Development Manager · PLAIO\n"
        + "Email: gunnar@plaio.com\n"
        + "LinkedIn: https://www.linkedin.com/in/gunnar-steindórsson-142b068b/\n"
        + "Web: plaio.com\n\n"
        + "PLAIO is digitalised pharma planning — when you're ready, I'd love to show you what we're building.\n\n"
        + "Talk soon,\nGunnar";
      show("Opening your mail app — sends to them ✓", "ok");
      window.location.href = "mailto:" + e + "?subject=" + enc(subject) + "&body=" + enc(body);
    });

    document.getElementById("toMe").addEventListener("click", function(){
      var n = name.value.trim(), e = email.value.trim(), nt = notes.value.trim();
      var subject = "New lead" + (n ? " — " + n : (e ? " — " + e : ""));
      var body = "Name: " + (n || "(not given)") + "\n"
        + "Email: " + (e || "(not given)") + "\n\n"
        + "Notes:\n" + (nt || "(none)") + "\n\n"
        + "— captured from my PLAIO card";
      show("Opening your mail app — saves to your inbox ✓", "ok");
      window.location.href = "mailto:gunnar@plaio.com?subject=" + enc(subject) + "&body=" + enc(body);
    });

    document.getElementById("clear").addEventListener("click", function(){
      name.value = ""; email.value = ""; notes.value = ""; show("", ""); name.focus();
    });
  })();
</script>
