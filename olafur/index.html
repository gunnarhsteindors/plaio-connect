<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>PLAIO - connect & capture</title>
<style>
  :root{--o:#F5A623;--amber:#FFBE44;--black:#1E1E1E;--slate:#9A9DB5;--line:#33333a;--field:#262629;}
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  html,body{width:100%;max-width:100%;overflow-x:hidden}
  body{font-family:"Helvetica Neue","Segoe UI",system-ui,-apple-system,Arial,sans-serif;-webkit-font-smoothing:antialiased;
    background:#141414;background-image:repeating-linear-gradient(135deg,rgba(255,255,255,.022) 0,rgba(255,255,255,.022) 1px,transparent 1px,transparent 22px);}
  .page{min-height:100vh;display:flex;align-items:flex-start;justify-content:center;
    padding:max(20px,env(safe-area-inset-top)) 16px max(34px,env(safe-area-inset-bottom));}
  .card{width:100%;max-width:480px;background:var(--black);border:1px solid #2c2c2c;border-radius:24px;
    padding:30px 24px 26px;color:#fff;box-shadow:0 24px 60px rgba(0,0,0,.45);
    background-image:repeating-linear-gradient(135deg,rgba(255,255,255,.016) 0,rgba(255,255,255,.016) 1px,transparent 1px,transparent 26px);}
  .logo{display:flex;justify-content:center;margin-bottom:8px}
  .logo img{height:40px;width:auto;display:block}
  .who{text-align:center;margin-bottom:24px}
  .who-name{color:#fff;font-size:21px;font-weight:700;letter-spacing:.2px}
  .who-role{color:var(--o);font-size:14px;font-weight:600;margin-top:4px}
  .qr-wrap{display:flex;flex-direction:column;align-items:center;gap:12px;margin-bottom:8px}
  .qr-cap{font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--slate);font-weight:600}
  .qr-tile{background:#fff;padding:14px;border-radius:18px;line-height:0;box-shadow:0 6px 22px rgba(0,0,0,.35)}
  .qr-tile img{width:200px;height:200px;max-width:60vw;max-height:60vw;display:block}
  .divider{display:flex;align-items:center;gap:12px;color:var(--slate);font-size:12px;letter-spacing:2px;
    text-transform:uppercase;font-weight:600;margin:28px 0 18px}
  .divider::before,.divider::after{content:"";flex:1;height:1px;background:#2c2c2c}
  label{display:block;font-size:12px;letter-spacing:1.2px;text-transform:uppercase;color:var(--slate);font-weight:600;margin-bottom:8px}
  input,textarea{width:100%;background:var(--field);border:1px solid var(--line);border-radius:12px;color:#fff;
    font-size:17px;padding:15px 15px;font-family:inherit;outline:none;transition:border-color .15s}
  input::placeholder,textarea::placeholder{color:#6c6c78}
  input:focus,textarea:focus{border-color:var(--o)}
  textarea{resize:vertical;min-height:90px;line-height:1.5}
  .field{margin-bottom:18px}
  .btns{display:flex;flex-direction:column;gap:12px;margin-top:6px}
  .btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;font-weight:700;font-size:17px;
    border-radius:13px;padding:17px;cursor:pointer;font-family:inherit;transition:background .15s,border-color .15s}
  .btn svg{width:20px;height:20px;flex:none}
  .btn-primary{background:var(--o);color:var(--black);border:none}
  .btn-primary:active{background:var(--amber)}
  .btn-ghost{background:transparent;color:var(--o);border:1px solid var(--o)}
  .btn-ghost:active{background:rgba(245,166,35,.12)}
  .status{font-size:14px;font-weight:600;text-align:center;margin-top:14px;min-height:20px}
  .status.ok{color:#5fd08a}
  .status.warn{color:var(--amber)}
  .hint{font-size:13px;color:var(--slate);line-height:1.5;text-align:center;margin-top:16px}
  .clear{display:block;margin:12px auto 0;background:none;border:none;color:var(--slate);font-size:14px;
    cursor:pointer;text-decoration:underline;font-family:inherit;padding:6px}
  .clear:active{color:var(--amber)}
  .footer{text-align:center;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--slate);
    font-weight:600;margin-top:24px;padding-top:18px;border-top:1px solid #2c2c2c}
  .footer .dot{color:var(--o);margin:0 5px}
</style>
</head>

    <div class="field">

      <input id="name" type="text" autocomplete="name" placeholder="First name">
    </div>
    <div class="field">

    </div>

    </div>

    <div class="btns">
      <button class="btn btn-primary" id="toLead">
        <svg viewBox="0 0 24 24" fill="none" stroke="#1E1E1E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
        Email my intro to them
      </button>
      <button class="btn btn-ghost" id="toMe">
        <svg viewBox="0 0 24 24" fill="none" stroke="#F5A623" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>

<script>
  (function(){
    var name = document.getElementById("name");
    var email = document.getElementById("email");
    var notes = document.getElementById("notes");
    var status = document.getElementById("status");
    function enc(s){ return encodeURIComponent(s); }
    function show(msg, cls){ status.textContent = msg; status.className = "status " + cls; }

    document.getElementById("toLead").addEventListener("click", function(){
      var n = name.value.trim(), e = email.value.trim();
      if(!e){ show("Add their email first ↑", "warn"); email.focus(); return; }
      var greet = n ? ("Hi " + n + ",") : "Hi there,";
      var subject = "Great connecting at BIO - Ólafur / PLAIO";
      var body = greet + "\n\n"
        + "Great connecting at BIO - looking forward to reaching back out once the event wraps up.\n\n"
        + "PLAIO - an advanced planning and scheduling solution - digitalises supply chain pharma planning. That means faster decisions, fewer surprises, and a plan everyone can actually trust.\n\n"
        + "Talk soon,\n"
        + "Ólafur\n"
        + "VP of Business Development, Global · PLAIO";
      show("Opening your mail app - sends to them ✓", "ok");
      window.location.href = "mailto:" + e + "?subject=" + enc(subject) + "&body=" + enc(body);
    });

    document.getElementById("toMe").addEventListener("click", function(){
      var n = name.value.trim(), e = email.value.trim(), nt = notes.value.trim();
      var subject = "New lead" + (n ? " - " + n : (e ? " - " + e : ""));
      var body = "Name: " + (n || "(not given)") + "\n"
        + "Email: " + (e || "(not given)") + "\n\n"
        + "Notes:\n" + (nt || "(none)") + "\n\n"
        + "- captured from my PLAIO card";
      show("Opening your mail app - saves to your inbox ✓", "ok");
      window.location.href = "mailto:olafur@plaio.com?subject=" + enc(subject) + "&body=" + enc(body);
    });

    document.getElementById("clear").addEventListener("click", function(){
      name.value = ""; email.value = ""; notes.value = ""; show("", ""); name.focus();
    });
  })();
</script>
